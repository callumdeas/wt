name: Release

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - run: npm install -g npm@latest

            - run: npm ci

            - run: npm run lint

            - run: npm run build

            - run: npx jest --watchman=false --ci

            - name: Set version from release tag
              run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

            - run: npm publish --access public --provenance

            - name: Bump Homebrew formula
              env:
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
              run: |
                  set -euo pipefail
                  if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
                      echo "HOMEBREW_TAP_TOKEN not set — skipping tap bump"
                      exit 0
                  fi

                  VERSION="${GITHUB_REF_NAME#v}"
                  TARBALL_URL="https://registry.npmjs.org/doubleut/-/doubleut-${VERSION}.tgz"

                  # Wait for the tarball to propagate with incremental backoff:
                  # 5s → 10s → 20s → 40s → 60s → 60s … up to 10 minutes total
                  delay=5
                  elapsed=0
                  while ! curl -fsLI "$TARBALL_URL" > /dev/null 2>&1; do
                      if [ "$elapsed" -ge 600 ]; then
                          echo "Tarball not available after 600s, giving up"
                          exit 1
                      fi
                      echo "Tarball not yet available; waited ${elapsed}s, retrying in ${delay}s"
                      sleep "$delay"
                      elapsed=$((elapsed + delay))
                      delay=$(( delay * 2 < 60 ? delay * 2 : 60 ))
                  done

                  curl -fsL "$TARBALL_URL" -o /tmp/wt.tgz
                  SHA256=$(sha256sum /tmp/wt.tgz | cut -d' ' -f1)

                  git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/CallumDeas/homebrew-wt.git" /tmp/tap
                  cd /tmp/tap
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git config user.name "github-actions[bot]"

                  sed -i.bak -E "s|url \"https://registry\.npmjs\.org/doubleut/-/doubleut-[^\"]+\"|url \"${TARBALL_URL}\"|" Formula/wt.rb
                  sed -i.bak -E "s|sha256 \"[a-f0-9]{64}\"|sha256 \"${SHA256}\"|" Formula/wt.rb
                  rm Formula/wt.rb.bak

                  if git diff --quiet Formula/wt.rb; then
                      echo "Formula already at ${VERSION}; nothing to commit"
                      exit 0
                  fi

                  git add Formula/wt.rb
                  git commit -m "wt ${VERSION}"
                  git push origin main
