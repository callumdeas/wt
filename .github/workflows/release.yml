name: Release

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - run: npm ci

            - run: npm run lint

            - run: npm run build

            - run: npx jest --watchman=false --ci

            - name: Set version from release tag
              run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

            - run: npm publish --access public --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Bump Homebrew formula
              env:
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
              run: |
                  set -euo pipefail
                  if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
                      echo "HOMEBREW_TAP_TOKEN not set — skipping tap bump"
                      exit 0
                  fi

                  VERSION="${GITHUB_REF_NAME#v}"
                  TARBALL_URL="https://registry.npmjs.org/doubleut/-/doubleut-${VERSION}.tgz"

                  # Wait for the just-published tarball to propagate (npm can take ~60s)
                  for i in $(seq 1 12); do
                      if curl -fsLI "$TARBALL_URL" > /dev/null; then break; fi
                      echo "Tarball not yet available; retry $i/12"
                      sleep 10
                  done

                  curl -fsL "$TARBALL_URL" -o /tmp/wt.tgz
                  SHA256=$(sha256sum /tmp/wt.tgz | cut -d' ' -f1)

                  git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/CallumDeas/homebrew-wt.git" /tmp/tap
                  cd /tmp/tap
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git config user.name "github-actions[bot]"

                  sed -i.bak -E "s|url \"https://registry\.npmjs\.org/doubleut/-/doubleut-[^\"]+\"|url \"${TARBALL_URL}\"|" Formula/wt.rb
                  sed -i.bak -E "s|sha256 \"[a-f0-9]{64}\"|sha256 \"${SHA256}\"|" Formula/wt.rb
                  rm Formula/wt.rb.bak

                  if git diff --quiet Formula/wt.rb; then
                      echo "Formula already at ${VERSION}; nothing to commit"
                      exit 0
                  fi

                  git add Formula/wt.rb
                  git commit -m "wt ${VERSION}"
                  git push origin main
